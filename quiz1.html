<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Übung</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            padding: 10px 0;
        }

        .quiz-container {
            max-width: 100%;
        }

        /* Question Card */
        .question-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 20px;
        }

        .question-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .question-badge {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .question-hint {
            color: #94a3b8;
            font-size: 13px;
            font-style: italic;
        }

        .question-text {
            color: #1e293b;
            font-size: 17px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 22px;
        }

        /* Answer Options */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .option-label:hover {
            border-color: #93c5fd;
            background: #eff6ff;
            transform: translateX(3px);
        }

        .option-label input[type="checkbox"] {
            display: none;
        }

        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            background: white;
        }

        .option-label input:checked + .custom-checkbox {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        .option-label input:checked + .custom-checkbox::after {
            content: '';
            width: 6px;
            height: 10px;
            border: 2px solid white;
            border-top: none;
            border-left: none;
            transform: rotate(45deg) translateY(-1px);
            display: block;
        }

        .option-text {
            color: #374151;
            font-size: 15px;
            line-height: 1.4;
            flex: 1;
        }

        /* Feedback States */
        .option-label.correct {
            border-color: #22c55e;
            background: #f0fdf4;
            pointer-events: none;
        }

        .option-label.correct .custom-checkbox {
            background: #22c55e;
            border-color: #22c55e;
        }

        .option-label.correct .custom-checkbox::after {
            content: '';
            width: 6px;
            height: 10px;
            border: 2px solid white;
            border-top: none;
            border-left: none;
            transform: rotate(45deg) translateY(-1px);
            display: block;
        }

        .option-label.wrong {
            border-color: #ef4444;
            background: #fef2f2;
            pointer-events: none;
        }

        .option-label.wrong .custom-checkbox {
            background: #ef4444;
            border-color: #ef4444;
        }

        .option-label.wrong .custom-checkbox::after {
            content: '✕';
            color: white;
            font-size: 13px;
            font-weight: bold;
            line-height: 1;
        }

        .option-label.missed {
            border-color: #f59e0b;
            background: #fffbeb;
            pointer-events: none;
        }

        .option-label.missed .custom-checkbox {
            background: #f59e0b;
            border-color: #f59e0b;
        }

        .option-label.missed .custom-checkbox::after {
            content: '!';
            color: white;
            font-size: 14px;
            font-weight: bold;
            line-height: 1;
        }

        .option-label.neutral {
            opacity: 0.55;
            pointer-events: none;
        }

        .option-label.neutral .option-text {
            color: #94a3b8;
        }

        .feedback-icon {
            margin-left: auto;
            font-size: 18px;
            flex-shrink: 0;
        }

        /* Feedback Message */
        .feedback-message {
            margin-top: 18px;
            padding: 16px 20px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            line-height: 1.5;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback-message.success {
            background: #f0fdf4;
            border: 1px solid #86efac;
            color: #166534;
            display: block;
        }

        .feedback-message.partial {
            background: #fffbeb;
            border: 1px solid #fcd34d;
            color: #92400e;
            display: block;
        }

        .feedback-message.error {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            display: block;
        }

        /* Score Bar */
        .score-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }

        .score-bar-bg {
            flex: 1;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .score-text {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* Reset Button */
        .reset-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding: 10px 20px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            color: #3b82f6;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reset-btn:hover {
            background: #eff6ff;
            border-color: #93c5fd;
            transform: translateY(-1px);
        }

        /* Progress */
        .quiz-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding: 14px 20px;
            background: white;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .progress-label {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
        }

        .progress-dots {
            display: flex;
            gap: 6px;
        }

        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e2e8f0;
            transition: background 0.3s ease;
        }

        .progress-dot.answered { background: #3b82f6; }
        .progress-dot.correct-dot { background: #22c55e; }
        .progress-dot.wrong-dot { background: #ef4444; }
    </style>
</head>
<body>
<div class="quiz-container">

    <!-- Progress -->
    <div class="quiz-progress">
        <span class="progress-label">Fortschritt:</span>
        <div class="progress-dots" id="progressDots"></div>
    </div>

    <!-- Questions generated by JS -->
    <div id="questionsContainer"></div>

</div>

<script>
// =============================================
//  HIER KANNST DU DEINE FRAGEN ANPASSEN
// =============================================
const questions = [
    {
        text: "Welche der folgenden Aussagen zu wissenschaftlichen Quellen sind korrekt?",
        options: [
            { text: "Peer-reviewed Artikel gelten als besonders verlässliche Quellen.", correct: true },
            { text: "Wikipedia ist eine zitierfähige wissenschaftliche Quelle.", correct: false },
            { text: "Monographien von Fachverlagen sind zitierfähig.", correct: true },
            { text: "Blogbeiträge sind immer zitierfähig.", correct: false },
            { text: "Sammelbände mit Herausgebern sind wissenschaftliche Quellen.", correct: true }
        ]
    },
    {
        text: "Was sind hilfreiche Inspirationsquellen für die Ideenfindung bei Seminararbeiten, aber keine zitierfähigen wissenschaftlichen Quellen?",
        options: [
            { text: "Instagram-Posts", correct: true },
            { text: "Zeitungen", correct: true },
            { text: "Pop-Science-Bücher", correct: true },
            { text: "Fachbücher", correct: false },
            { text: "Fachartikel", correct: false },
            { text: "InMind-Beiträge", correct: false }
        ]
    },
    {
        text: "Welche Merkmale kennzeichnen eine gute wissenschaftliche Fragestellung?",
        options: [
            { text: "Sie ist klar und präzise formuliert.", correct: true },
            { text: "Sie kann mit Ja oder Nein beantwortet werden.", correct: false },
            { text: "Sie ist empirisch oder theoretisch beantwortbar.", correct: true },
            { text: "Sie ist so offen wie möglich gehalten.", correct: false },
            { text: "Sie hat einen erkennbaren Bezug zur Fachliteratur.", correct: true }
        ]
    }
];
// =============================================

const container = document.getElementById('questionsContainer');
const dotsContainer = document.getElementById('progressDots');
const answered = new Array(questions.length).fill(false);
const results = new Array(questions.length).fill(null);

// ── localStorage helpers ──────────────────────────────────────
// Each quiz file needs a unique storage key so multiple quizzes
// on the same site don't overwrite each other.
const STORAGE_KEY = 'quiz_' + window.location.pathname;

function saveState() {
    const state = questions.map((q, qi) => ({
        answered: answered[qi],
        result: results[qi],
        selected: q.options.map((_, oi) => document.getElementById(`cb-${qi}-${oi}`).checked)
    }));
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function loadState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) { return null; }
}

function clearState() {
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}
// ─────────────────────────────────────────────────────────────

// Build progress dots
questions.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    dot.id = `dot-${i}`;
    dotsContainer.appendChild(dot);
});

// Build questions
questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${qi}`;

    card.innerHTML = `
        <div class="question-meta">
            <span class="question-badge">Frage ${qi + 1} von ${questions.length}</span>
            <span class="question-hint">Mehrere Antworten möglich</span>
        </div>
        <div class="question-text">${q.text}</div>
        <div class="options-list" id="options-${qi}">
            ${q.options.map((opt, oi) => `
                <label class="option-label" id="opt-${qi}-${oi}" onclick="handleChange(${qi}, ${oi})">
                    <input type="checkbox" id="cb-${qi}-${oi}">
                    <div class="custom-checkbox"></div>
                    <span class="option-text">${opt.text}</span>
                    <span class="feedback-icon" id="icon-${qi}-${oi}"></span>
                </label>
            `).join('')}
        </div>
        <div class="feedback-message" id="feedback-${qi}"></div>
        <button class="reset-btn" id="reset-${qi}" onclick="resetQuestion(${qi})" style="display:none">
            ↺ Nochmal versuchen
        </button>
    `;
    container.appendChild(card);
});

// ── Restore saved state after DOM is built ───────────────────
const savedState = loadState();
if (savedState) {
    savedState.forEach((s, qi) => {
        if (!s.answered) return;
        // Restore checkbox values silently
        s.selected.forEach((checked, oi) => {
            document.getElementById(`cb-${qi}-${oi}`).checked = checked;
        });
        // Re-run evaluation to restore visual state
        evaluateQuestion(qi, true); // true = restoring, skip re-save
    });
}
// ─────────────────────────────────────────────────────────────

function handleChange(qi, oi) {
    if (answered[qi]) return;
    const cb = document.getElementById(`cb-${qi}-${oi}`);
    cb.checked = !cb.checked;
    evaluateQuestion(qi);
}

function evaluateQuestion(qi, restoring = false) {
    const q = questions[qi];
    const selected = q.options.map((_, oi) => document.getElementById(`cb-${qi}-${oi}`).checked);
    const anySelected = selected.some(Boolean);
    if (!anySelected) return;

    let correctSelected = 0, wrongSelected = 0, missedCorrect = 0;

    q.options.forEach((opt, oi) => {
        const label = document.getElementById(`opt-${qi}-${oi}`);
        const icon  = document.getElementById(`icon-${qi}-${oi}`);
        label.classList.remove('correct', 'wrong', 'missed', 'neutral');

        if (selected[oi] && opt.correct) {
            label.classList.add('correct'); icon.textContent = '✓'; correctSelected++;
        } else if (selected[oi] && !opt.correct) {
            label.classList.add('wrong');   icon.textContent = '✗'; wrongSelected++;
        } else if (!selected[oi] && opt.correct) {
            label.classList.add('missed');  icon.textContent = '!'; missedCorrect++;
        } else {
            label.classList.add('neutral'); icon.textContent = '';
        }
    });

    answered[qi] = true;
    const fb       = document.getElementById(`feedback-${qi}`);
    const dot      = document.getElementById(`dot-${qi}`);
    const resetBtn = document.getElementById(`reset-${qi}`);
    const totalCorrect = q.options.filter(o => o.correct).length;

    if (wrongSelected === 0 && missedCorrect === 0) {
        fb.className = 'feedback-message success';
        fb.innerHTML = `🎉 <strong>Perfekt!</strong> Du hast alle richtigen Antworten gefunden.`;
        dot.className = 'progress-dot correct-dot';
        results[qi] = 'correct';
    } else if (wrongSelected > 0) {
        fb.className = 'feedback-message error';
        fb.innerHTML = `❌ <strong>Nicht ganz.</strong> Du hast ${wrongSelected} falsche Antwort${wrongSelected > 1 ? 'en' : ''} gewählt.${missedCorrect > 0 ? ` ${missedCorrect} richtige Antwort${missedCorrect > 1 ? 'en fehlen' : ' fehlt'} noch.` : ''}`;
        dot.className = 'progress-dot wrong-dot';
        results[qi] = 'wrong';
        resetBtn.style.display = 'inline-flex';
    } else if (missedCorrect > 0) {
        fb.className = 'feedback-message partial';
        fb.innerHTML = `⚠️ <strong>Fast!</strong> Du hast ${correctSelected} von ${totalCorrect} richtigen Antworten gefunden. Es ${missedCorrect === 1 ? 'fehlt noch eine' : `fehlen noch ${missedCorrect}`}.`;
        dot.className = 'progress-dot wrong-dot';
        results[qi] = 'partial';
        resetBtn.style.display = 'inline-flex';
    }

    if (!restoring) saveState();
}

function resetQuestion(qi) {
    const q = questions[qi];
    answered[qi] = false;
    results[qi] = null;

    q.options.forEach((_, oi) => {
        const cb    = document.getElementById(`cb-${qi}-${oi}`);
        const label = document.getElementById(`opt-${qi}-${oi}`);
        const icon  = document.getElementById(`icon-${qi}-${oi}`);
        cb.checked = false;
        label.className = 'option-label';
        label.setAttribute('onclick', `handleChange(${qi}, ${oi})`);
        icon.textContent = '';
    });

    document.getElementById(`feedback-${qi}`).className = 'feedback-message';
    document.getElementById(`feedback-${qi}`).innerHTML = '';
    document.getElementById(`reset-${qi}`).style.display = 'none';
    document.getElementById(`dot-${qi}`).className = 'progress-dot';

    saveState();
}
</script>
</body>
</html>
